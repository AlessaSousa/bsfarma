<section class="container-menu relative" [class.collapsed]="isCollapsed">
    <header class="container-perfil">
        @if(imgProfile()) {
            <img [src]="imgProfile()" height="42px" width="42px">
        } @else {
            <i class="pi pi-user text-2xl"></i>
        }
         <div class="flex flex-column">
            <span>Juliana Salgado</span>
            <small class="text-yellow">Super Admin</small>
         </div>
         <i class="pi pi-ellipsis-v"></i>
    </header>
    
    <aside class="container-items">
        <p-panelmenu [model]="items">
        <ng-template pTemplate="item" let-item>
            <a pRipple class="flex items-center px-4 py-2 cursor-pointer group" [class.active]="activeItem === item" (click)="selectItem(item)">
            <i [class]="item.icon + ' text-primary group-hover:text-inherit'"></i>

            <span class="ml-2">
                {{ item.label }}
            </span>

            <p-badge *ngIf="item.badge" class="ml-auto" [value]="item.badge"></p-badge>

            <span *ngIf="item.shortcut" class="ml-auto border border-surface rounded
            bg-emphasis text-muted-color text-xs p-1">
                {{ item.shortcut }}
            </span>
            </a>
        </ng-template>
        </p-panelmenu>
    </aside>
