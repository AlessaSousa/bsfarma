<div>
    <header>
        <small class="px-5 text-obs">Lista de usuários.</small>
    </header>

    <div class="px-5 pt-3 relative">
        <p-table [value]="listUsers()" [paginator]="true" [rows]="8" [rowsPerPageOptions]="[8, 16, 32]" dataKey="id"
            [globalFilterFields]="['nome', 'login', 'perfil']" #dt>
            <ng-template #caption>
                <div class="flex">
                    <p-iconfield iconPosition="left" class="ml-auto">
                        <p-inputicon>
                            <i class="pi pi-search"></i>
                        </p-inputicon>
                        <input pInputText type="text" (input)="dt.filterGlobal($event.target.value, 'contains')"
                            placeholder="Buscar" />
                    </p-iconfield>
                </div>
            </ng-template>
    
            <ng-template #header>
                <tr>
                    <th pSortableColumn="nome">
                        <div class="flex items-center gap-2">
                            Nome
                            <p-sortIcon field="nome" />
                        </div>
                    </th>
    
                    <th pSortableColumn="login">
                        <div class="flex items-center gap-2">
                            Login
                            <p-sortIcon field="login" />
                        </div>
                    </th>
    
                    <th pSortableColumn="perfil">
                        <div class="flex items-center gap-2">
                            Perfil
                            <p-sortIcon field="perfil" />
                        </div>
                    </th>
    
                    <th pSortableColumn="acesso">
                        <div class="flex items-center gap-2">
                            Último acesso
                            <p-sortIcon field="acesso" />
                        </div>
                    </th>
    
                    <th>
                        Status
                    </th>
    
                    <th>
                        Ação
                    </th>
                </tr>
            </ng-template>
    
            <ng-template #body let-item>
                <tr>
                    <td>{{ item.nome }}</td>
                    <td>{{ item.login }}</td>
                    <td>{{ item.perfil }}</td>
                    <td>{{ item.ultimo_acesso | date: "dd/MM/yyyy" }}</td>
                    <td>
                        <span [class]="item.ativo ? 'item-active' : 'item-inactive'">
                            {{ item.ativo ? 'Ativo' : 'Inativo' }}
                        </span>
                    </td>
                    <td>
                        <span class="flex gap-1 cursor-pointer">
                            <small>Detalhes</small>
                            <i class="pi pi-angle-double-right"></i>
                        </span>
                    </td>
                </tr>
            </ng-template>
        </p-table>
        <div class="btn-add">
            <p-button 
            label="Adicionar Usuário" 
            icon="pi pi-plus"
            (click)="showDialog()"
            />
        </div>
    </div>
</div>


<p-dialog
[(visible)]="isVisible"
[modal]="true"
[draggable]="false"
[resizable]="false"
[style]="{width: '30rem'}"
(onHide)="closeModal()"
header="Cadastro de Usuário"
>
@if(isVisible()) {
    <app-form-user 
    [(isVisible)]="isVisible"
    (onChangeData)="submit($event)"
    />
}
</p-dialog>
