<form class="" [formGroup]="form">
    <div class="col-12">
        <div class="flex flex-column gap-2">
            <label for="nome">Nome</label>
            <input 
            pInputText id="nome" 
            placeholder="Ex: Ana Lima" 
            formControlName="nome"
            />
        </div>
    </div>

    @if(typeDialog() === 'create') {

        <div class="col-12">
            <div class="flex flex-column gap-2">
                <label for="login">Login</label>
                <input 
                pInputText 
                id="login" 
                placeholder="Ex: ana.lima" 
                formControlName="login"
                />
            </div>
        </div>

        <div class="col-12">
            <div class="flex flex-column gap-2">
                <label for="password">Senha</label>
                <p-password 
                [toggleMask]="true" 
                fluid 
                id="password" 
                formControlName="senha"
                />
            </div>
        </div>
    }

    <div class="col-12">
        <div class="flex flex-column gap-2">
            <label for="forma">Perfil</label>
            <p-select 
            id="forma" 
            [options]="typeProfile()" 
            optionLabel="label" 
            optionValue="value"
            placeholder="Selecione um perfil"
            appendTo="body"
            formControlName="perfil"
            fluid
            />
        </div>
    </div>


    @if(typeDialog() === 'update') {
        <div class="col-12 flex align-items-end">
            <div class="flex gap-2 align-items-center switch">
                <div class="flex flex-column">
                    <label for="ativo">{{checked ? 'Ativo' : 'Inativo'}}</label>
                </div>
               <p-toggleswitch 
               id="ativo" 
               [(ngModel)]="checked" 
               [ngModelOptions]="{standalone: true}" 
               fluid
               />
            </div>
        </div>
    }

    <div class="flex justify-content-end gap-4 w-full pt-4 pr-1">
        <p-button 
        label="Cancelar" 
        severity="danger" 
        (click)="close()" />
        
        <p-button 
        label="Salvar" 
        severity="success" 
        (click)="submit()" />
    </div>

</form>
